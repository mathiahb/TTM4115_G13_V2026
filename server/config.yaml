# Drones Configuration
drones:
  - drone_id: "1"
    location:
      lat: 63.4157
      lon: 10.4060
      gps_valid: true
    battery_level: 95.0
    max_payload: 2.5
    state: "standby"

  - drone_id: "2"
    location:
      lat: 63.4342
      lon: 10.4060
      gps_valid: true
    battery_level: 45.0
    max_payload: 2.5
    state: "standby"

# Default Customer Location (used when frontend doesn't provide one)
default_customer_location:
  lat: 63.4220
  lon: 10.4000

# Delivery Configuration
delivery:
  min_battery_for_delivery: 20.0
  max_range_standard_km: 5.0
  max_range_priority_km: 3.0
  max_single_charge_range_km: 3.0
