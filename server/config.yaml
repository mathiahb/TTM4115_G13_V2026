# Server Configuration
server:
  host: "0.0.0.0"
  port: 5000
  debug: true
  secret_key_env: "FLASK_SECRET"
  secret_key_default: "dev-secret-change-in-prod"

# MQTT Broker Configuration
mqtt:
  broker_host: "mqtt20.iik.ntnu.no"
  broker_port: 1883
  websocket_port: 1884
  client_id_prefix: "server"
  qos: 1
  # Prefix for all MQTT topics (important for shared broker)
  topic_prefix: "ttm4115/team13"
  topics:
    telemetry: "drones/{drone_id}/telemetry"
    dispatch: "drones/{drone_id}/dispatch"
    events: "drones/{drone_id}/events"

