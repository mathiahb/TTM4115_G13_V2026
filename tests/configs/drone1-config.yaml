drone:
  drone_id: "1"
  telemetry_interval: 1
  initial_location:
    lat: 63.4342
    lon: 10.4060
    gps_valid: true
  initial_battery: 100.0
  max_payload: 2.5

mqtt:
  broker_host: "broker"
  broker_port: 1883
  client_id_prefix: "drone"
  qos: 1
  topic_prefix: "ttm4115/team13"
  topics:
    telemetry: "drones/{drone_id}/telemetry"
    dispatch: "drones/{drone_id}/dispatch"
    events: "drones/{drone_id}/events"

movement:
  travel_speed: 3.0
  battery_drain_per_second: 1.5
  arrival_threshold: 0.25
  movement_update_interval: 500

battery:
  min_battery_for_delivery: 20.0
  charging_threshold: 30.0
  fully_charged_threshold: 95.0
  consumption_rate_per_km: 0.5

charging:
  full_charge_time_minutes: 1
  status_update_interval: 5.0

simulation:
  enabled: true
  battery_drain_per_second: 0.5
  movement_speed_mps: 300.0

display:
  enabled: false
